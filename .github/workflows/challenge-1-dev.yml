name: "Challenge 1: Dev"

on:
  pull_request:
    branches: [dev]
    paths:
      - "challenge-1/**"
      - ".github/workflows/challenge-1-dev.yml"
  push:
    branches: [dev]
    paths:
      - "challenge-1/**"
      - ".github/workflows/challenge-1-dev.yml"

env:
  TERRAFORM_VERSION: "1.15.7"
  WORKING_DIR: "challenge-1"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: "Plan (dev)"
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform Init
        run: terraform init -backend-config=backends/dev.backend.hcl

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=envs/dev.tfvars -out=dev.tfplan -no-color
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_vm_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-challenge-1
          path: ${{ env.WORKING_DIR }}/dev.tfplan
          retention-days: 5

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan (dev)\n\`\`\`\n${{ steps.plan.outputs.stdout }}\n\`\`\`\n*Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply:
    name: "Apply (dev)"
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform Init
        run: terraform init -backend-config=backends/dev.backend.hcl

      - name: Terraform Plan
        run: terraform plan -var-file=envs/dev.tfvars -out=dev.tfplan
        env:
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_vm_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Terraform Apply
        run: terraform apply dev.tfplan
